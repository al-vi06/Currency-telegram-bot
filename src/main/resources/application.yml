spring:
  application:
    name: сrypto bot
  datasource:
    url: jdbc:postgresql://localhost:5432/db_subscribers
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: subscribers_schema
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS subscribers_schema
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
      defer-datasource-initialization: true
      open-in-view: false
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    main:
      allow-circular-references: true